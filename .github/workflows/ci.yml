name: CI — Verificação de Código

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Verificação TypeScript (Front-end Mobile)
  # -----------------------------------------------------------------------
  typecheck-frontend:
    name: 🔍 TypeScript — Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Front-end/mobile

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Front-end/mobile/package-lock.json

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Verificar tipos TypeScript
        run: npx tsc --noEmit

  # -----------------------------------------------------------------------
  # Job 2: Verificação TypeScript (Back-end)
  # -----------------------------------------------------------------------
  typecheck-backend:
    name: 🔍 TypeScript — Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Back-end

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Back-end/package-lock.json

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Verificar tipos TypeScript
        run: npx tsc --noEmit

  # -----------------------------------------------------------------------
  # Job 3: Resumo final (depende dos dois jobs acima)
  # -----------------------------------------------------------------------
  ci-success:
    name: ✅ CI Aprovado
    runs-on: ubuntu-latest
    needs: [typecheck-frontend, typecheck-backend]
    if: always()

    steps:
      - name: Verificar resultado
        run: |
          if [[ "${{ needs.typecheck-frontend.result }}" == "success" && "${{ needs.typecheck-backend.result }}" == "success" ]]; then
            echo "✅ Todos os checks passaram!"
          else
            echo "❌ Um ou mais checks falharam."
            exit 1
          fi
